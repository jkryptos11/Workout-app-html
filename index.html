<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   COLOUR SYSTEM — Light Theme
   Original palette used correctly:
   #4B3596 Purple  — 9.3:1 on white  ✅ text/icons/accents
   #287596 Teal    — 5.1:1 on white  ✅ text/icons/accents
   #77E9E6 Aqua    — 1.4:1 on white  ❌ decoration/fills ONLY, dark text on top
   #AD6D15 Amber   — 4.2:1 on white  ✅ large text / bold labels only
   #79380B Rust    — 8.8:1 on white  ✅ text/icons/accents
   #AC1A4C Crimson — 7.0:1 on white  ✅ text/icons/accents
   ═══════════════════════════════════════════ */
:root {
  --bg:         #F7F5FF;
  --bg2:        #EEEAFF;
  --surface:    #FFFFFF;
  --surface2:   #F2F0FC;
  --surface3:   #EAE6FA;
  --border:     #DDD8F5;
  --border2:    #CBC4EE;

  --purple:     #4B3596;
  --teal:       #287596;
  --aqua:       #77E9E6;   /* decoration fills only */
  --aqua-text:  #1a5a58;   /* dark teal for text on aqua bg */
  --amber:      #AD6D15;
  --rust:       #79380B;
  --crimson:    #AC1A4C;

  /* Card accent fills (light tints) */
  --purple-tint:  #EDE9FF;
  --teal-tint:    #E3F4FA;
  --amber-tint:   #FDF0DC;
  --rust-tint:    #FAEDE6;
  --crimson-tint: #FDEAF0;
  --aqua-tint:    #E2FFFE;

  --text:       #1C1535;
  --text2:      #4A4270;
  --text3:      #8880AA;

  --radius:     16px;
  --radius-sm:  10px;
  --shadow:     0 2px 12px rgba(75,53,150,0.08);
  --shadow-md:  0 4px 20px rgba(75,53,150,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Rubik', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: 100px;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,245,255,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-wrap { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
.logo-name {
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 17px; letter-spacing: 0.3px;
  color: var(--purple);
}
.logo-sub { font-size: 9px; color: var(--text3); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 1px; }
.header-date { font-size: 11px; color: var(--text3); }

/* ── PAGE SYSTEM ── */
.page { display: none; }
.page.active { display: block; }

/* ── HOME PAGE ── */
.home-top { padding: 18px 16px 8px; }
.home-greeting {
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 26px; color: var(--text);
}
.home-greeting span { color: var(--purple); }
.home-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

.day-cards { padding: 8px 16px 0; display: flex; flex-direction: column; gap: 12px; }

.day-card {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  box-shadow: var(--shadow);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  min-height: 128px;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.day-card:active { transform: scale(0.98); box-shadow: none; }

/* Card colour theming */
.card-d1 { background: linear-gradient(135deg, var(--purple-tint) 0%, #d8d0ff 100%); border-color: #c8bff0; }
.card-d2 { background: linear-gradient(135deg, var(--teal-tint) 0%, #b8e8f5 100%); border-color: #9dd4e8; }
.card-d3 { background: linear-gradient(135deg, var(--rust-tint) 0%, #f5d4c0 100%); border-color: #e8b89a; }
.card-d4 { background: linear-gradient(135deg, var(--crimson-tint) 0%, #f5c8d8 100%); border-color: #e8a8c0; }

.card-content { position: relative; z-index: 2; padding: 14px 16px 14px; }
.card-badge {
  display: inline-flex; align-items: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 10px; letter-spacing: 2.5px;
  text-transform: uppercase; padding: 3px 10px;
  border-radius: 999px; margin-bottom: 6px;
}
.card-d1 .card-badge { background: rgba(75,53,150,0.12); color: var(--purple); }
.card-d2 .card-badge { background: rgba(40,117,150,0.12); color: var(--teal); }
.card-d3 .card-badge { background: rgba(121,56,11,0.12); color: var(--rust); }
.card-d4 .card-badge { background: rgba(172,26,76,0.12); color: var(--crimson); }

.card-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 18px; line-height: 1.2;
  color: var(--text); margin-bottom: 6px;
}
.card-meta { display: flex; gap: 12px; }
.card-stat { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.card-stat strong { font-weight: 600; }
.card-d1 .card-stat strong { color: var(--purple); }
.card-d2 .card-stat strong { color: var(--teal); }
.card-d3 .card-stat strong { color: var(--rust); }
.card-d4 .card-stat strong { color: var(--crimson); }

.card-arrow {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%); z-index: 2;
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid;
}
.card-d1 .card-arrow { background: rgba(75,53,150,0.1); border-color: rgba(75,53,150,0.25); }
.card-d2 .card-arrow { background: rgba(40,117,150,0.1); border-color: rgba(40,117,150,0.25); }
.card-d3 .card-arrow { background: rgba(121,56,11,0.1); border-color: rgba(121,56,11,0.25); }
.card-d4 .card-arrow { background: rgba(172,26,76,0.1); border-color: rgba(172,26,76,0.25); }

/* muscle SVG illustration */
.card-illustration {
  position: absolute; right: 44px; top: 0; bottom: 0;
  width: 110px; pointer-events: none; z-index: 1; opacity: 0.45;
  display: flex; align-items: center;
}
.card-illustration svg { width: 100%; height: 100%; }

/* ── MOBILITY CARD ── */
.mobility-section { padding: 12px 16px 0; }
.mobility-card {
  background: linear-gradient(135deg, var(--aqua-tint) 0%, #c8f8f7 100%);
  border: 1px solid rgba(119,233,230,0.5);
  border-radius: var(--radius); padding: 16px;
  cursor: pointer; position: relative; overflow: hidden;
  box-shadow: var(--shadow); transition: transform 0.18s;
}
.mobility-card:active { transform: scale(0.98); }
.mobility-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.mobility-card-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 17px; color: var(--aqua-text);
}
.mobility-card-sub { font-size: 11px; color: #2a7a78; margin-bottom: 11px; }
.mob-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.mob-pill {
  background: rgba(40,117,100,0.1); border: 1px solid rgba(40,117,100,0.2);
  color: var(--aqua-text); font-size: 10px; font-weight: 500;
  padding: 4px 10px; border-radius: 999px; font-family: 'Rubik', sans-serif;
}
.mobility-arrow {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(40,117,100,0.1); border: 1.5px solid rgba(40,117,100,0.2);
  display: flex; align-items: center; justify-content: center;
}

/* ── WORKOUT PAGE ── */
.workout-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 8px;
}
.back-btn {
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; box-shadow: var(--shadow);
  font-size: 18px;
}
.workout-title-wrap { flex: 1; }
.workout-day-label { font-size: 10px; color: var(--text3); letter-spacing: 2.5px; text-transform: uppercase; }
.workout-day-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 800; font-size: 21px; color: var(--text); line-height: 1.1;
}
.workout-day-focus { font-size: 12px; margin-top: 1px; font-weight: 500; }

/* Progress bar */
.progress-wrap { padding: 4px 16px 12px; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.progress-label {
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase;
}
.progress-label span { color: var(--purple); }
.reset-btn {
  background: var(--surface); border: 1px solid var(--border2); color: var(--text3);
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 12px;
  border-radius: 7px; cursor: pointer;
}
.progress-bar-bg { background: var(--surface3); border-radius: 999px; height: 5px; overflow: hidden; border: 1px solid var(--border); }
.progress-bar-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }

/* Section labels */
.section-label {
  font-family: 'Outfit', sans-serif; font-weight: 700;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  padding: 10px 16px 6px; display: flex; align-items: center; gap: 8px;
}
.section-label.warmup { color: var(--amber); }
.section-label.main   { color: var(--purple); }
.section-label.cool   { color: var(--teal); }
.section-label.mob-section { color: var(--aqua-text); }
.section-line { flex: 1; height: 1px; background: var(--border); }

/* Exercise cards */
.exercises { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

.ex-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden;
  transition: all 0.2s; box-shadow: var(--shadow);
}
.ex-card.warmup-card { border-left: 3px solid var(--amber); }
.ex-card.main-card   { border-left: 3px solid var(--purple); }
.ex-card.cool-card   { border-left: 3px solid var(--teal); }
.ex-card.mob-card    { border-left: 3px solid var(--aqua-text); }

.ex-card.done {
  background: #f0faf0; border-color: #c8e8c8; opacity: 0.72;
}
.ex-card.done.warmup-card { border-left-color: #c8aa88; }
.ex-card.done.main-card   { border-left-color: #a898d8; }
.ex-card.done.cool-card   { border-left-color: #88c8d8; }

.ex-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; }

.ex-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: none; transition: all 0.2s;
}
.ex-card.done .ex-check { background: #2a7a2a; border-color: #2a7a2a; color: white; font-size: 12px; }
.warmup-card .ex-check { border-color: rgba(173,109,21,0.4); }
.main-card   .ex-check { border-color: rgba(75,53,150,0.35); }
.cool-card   .ex-check { border-color: rgba(40,117,150,0.35); }
.mob-card    .ex-check { border-color: rgba(26,90,88,0.35); }

.ex-info { flex: 1; min-width: 0; }
.ex-name {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px;
  text-transform: uppercase; letter-spacing: 0.3px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ex-card.done .ex-name { text-decoration: line-through; color: var(--text3); }
.ex-meta-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.ex-meta { font-size: 11px; color: var(--text3); }
.warmup-card .ex-meta { color: rgba(173,109,21,0.75); }
.main-card   .ex-meta { color: rgba(75,53,150,0.65); }
.cool-card   .ex-meta { color: rgba(40,117,150,0.65); }
.timed-badge {
  font-size: 9px; font-weight: 600; letter-spacing: 0.5px;
  background: rgba(75,53,150,0.08); color: var(--purple);
  padding: 1px 6px; border-radius: 999px; border: 1px solid rgba(75,53,150,0.15);
}

.ex-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.yt-btn {
  background: rgba(172,26,76,0.08); border: 1px solid rgba(172,26,76,0.2);
  color: var(--crimson); font-size: 10px; font-weight: 700;
  width: 27px; height: 27px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; flex-shrink: 0;
}
.expand-icon { color: var(--text3); font-size: 14px; transition: transform 0.2s; }
.ex-card.expanded .expand-icon { transform: rotate(180deg); }

/* Note footer */
.ex-note {
  padding: 0 14px 10px;
  display: flex; align-items: flex-start; gap: 5px;
}
.ex-note-icon { font-size: 11px; flex-shrink: 0; margin-top: 1px; }
.ex-note-text {
  font-size: 11px; color: var(--text3); line-height: 1.45;
  font-style: italic;
}
.warmup-card .ex-note-text { color: rgba(173,109,21,0.7); }
.main-card   .ex-note-text { color: rgba(75,53,150,0.6); }
.cool-card   .ex-note-text { color: rgba(40,117,150,0.6); }

/* Sets panel */
.sets-panel { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
.ex-card.expanded .sets-panel { display: block; }

.sets-label {
  font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 2px; color: var(--text3); text-transform: uppercase;
  padding: 10px 0 8px;
}
.sets-grid { display: flex; gap: 7px; flex-wrap: wrap; }
.set-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 8px; text-align: center;
  min-width: 66px; flex: 1; transition: all 0.2s;
}
.set-item.completed { background: #e8f8e8; border-color: #a8d8a8; }
.set-num {
  font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 700;
  color: var(--text3); text-transform: uppercase; letter-spacing: 1px;
}
.reps-input {
  width: 100%; background: none; border: none;
  border-bottom: 1.5px solid var(--border2); color: var(--text);
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 17px;
  text-align: center; padding: 3px 0; margin: 5px 0; outline: none;
}
.reps-input:focus { border-color: var(--purple); color: var(--purple); }
.set-item.completed .reps-input { color: #2a7a2a; border-color: #a8d8a8; }
.set-done-btn {
  background: var(--surface3); border: 1px solid var(--border2); color: var(--text3);
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; padding: 5px 6px;
  border-radius: 6px; cursor: pointer; width: 100%; transition: all 0.15s;
}
.set-item.completed .set-done-btn { background: #c8e8c8; border-color: #a8d8a8; color: #2a7a2a; }

/* Timer */
.timer-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(75,53,150,0.07); border: 1px solid rgba(75,53,150,0.2);
  color: var(--purple); font-family: 'Outfit', sans-serif;
  font-weight: 600; font-size: 11px; letter-spacing: 1px;
  text-transform: uppercase; padding: 7px 12px; border-radius: 8px;
  cursor: pointer; margin-top: 10px;
}
.warmup-card .timer-btn { background: rgba(173,109,21,0.07); border-color: rgba(173,109,21,0.2); color: var(--amber); }
.cool-card   .timer-btn { background: rgba(40,117,150,0.07); border-color: rgba(40,117,150,0.2); color: var(--teal); }
.timer-btn.active { background: rgba(172,26,76,0.08); border-color: rgba(172,26,76,0.2); color: var(--crimson); }

.timer-display { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; text-align: center; margin-top: 8px; }
.timer-display.visible { display: block; }
.timer-time {
  font-family: 'Outfit', sans-serif; font-weight: 800;
  font-size: 46px; letter-spacing: 2px; line-height: 1; color: var(--purple);
}
.timer-time.warning { color: var(--crimson); animation: tpulse 0.6s ease infinite alternate; }
.timer-time.done-t  { color: #2a7a2a; }
@keyframes tpulse { from { opacity: 1; } to { opacity: 0.4; } }
.timer-label { font-size: 10px; color: var(--text3); margin-top: 5px; letter-spacing: 1.5px; text-transform: uppercase; }
.timer-controls { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
.t-ctrl-btn {
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 1px; text-transform: uppercase; padding: 8px 18px;
  border-radius: 8px; cursor: pointer; border: 1px solid;
}
.t-start { background: rgba(75,53,150,0.08); border-color: rgba(75,53,150,0.25); color: var(--purple); }
.t-pause { background: rgba(172,26,76,0.08); border-color: rgba(172,26,76,0.25); color: var(--crimson); }
.t-reset { background: var(--surface3); border-color: var(--border2); color: var(--text3); }
.timer-sound-note { font-size: 10px; color: var(--text3); margin-top: 5px; }

/* Log button */
.complete-wrap { padding: 14px 16px; }
.complete-btn {
  width: 100%; border: none; color: #fff;
  font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 16px;
  letter-spacing: 3px; text-transform: uppercase; padding: 17px;
  border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(75,53,150,0.3);
}
.complete-btn:active { transform: scale(0.97); opacity: 0.9; }

/* ── PROGRESS / HISTORY PAGE ── */
.page-top { padding: 16px 16px 6px; display: flex; align-items: center; justify-content: space-between; }
.page-title {
  font-family: 'Outfit', sans-serif; font-weight: 800;
  font-size: 23px; color: var(--text);
}

.cal-nav {
  display: flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 3px; margin: 8px 16px 0;
  box-shadow: var(--shadow);
}
.cal-view-btn {
  flex: 1; background: none; border: none; color: var(--text3);
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; padding: 8px 6px;
  border-radius: 7px; cursor: pointer; transition: all 0.2s;
}
.cal-view-btn.active { background: var(--purple); color: #fff; }

.cal-period-nav { display: flex; align-items: center; gap: 8px; margin: 10px 16px 0; }
.cal-arrow {
  background: var(--surface); border: 1px solid var(--border); color: var(--text3);
  width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  box-shadow: var(--shadow);
}
.cal-period-title {
  flex: 1; text-align: center;
  font-family: 'Outfit', sans-serif; font-weight: 700;
  font-size: 14px; letter-spacing: 0.5px; color: var(--text);
}

/* Calendar grids */
.week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; padding: 10px 16px 4px; }
.week-day-label { text-align: center; font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 700; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; padding-bottom: 3px; }
.week-day-cell {
  aspect-ratio: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; box-shadow: var(--shadow);
}
.week-day-cell.today { border-color: var(--purple); }
.week-day-cell.has-workout { background: rgba(75,53,150,0.08); border-color: rgba(75,53,150,0.3); }
.week-day-cell.has-mobility { background: rgba(119,233,230,0.15); border-color: rgba(26,90,88,0.25); }
.week-day-cell.has-both { background: linear-gradient(135deg,rgba(75,53,150,0.1),rgba(119,233,230,0.12)); border-color: rgba(40,117,150,0.3); }
.wd-num { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px; color: var(--text3); }
.week-day-cell.today .wd-num { color: var(--purple); }
.week-day-cell.has-workout .wd-num { color: var(--purple); }
.week-day-cell.has-mobility .wd-num { color: var(--aqua-text); }
.week-day-cell.has-both .wd-num { color: var(--teal); }
.wd-dots { display: flex; gap: 2px; margin-top: 2px; }
.wd-dot { width: 4px; height: 4px; border-radius: 50%; }

.month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; padding: 6px 16px; }
.month-cell {
  aspect-ratio: 1; border-radius: 7px; background: var(--surface);
  border: 1px solid transparent; display: flex; align-items: center; justify-content: center;
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 12px; color: var(--text3);
}
.month-cell.empty { background: transparent; border-color: transparent; }
.month-cell.today { border-color: var(--purple); color: var(--purple); }
.month-cell.has-workout { background: rgba(75,53,150,0.1); border-color: rgba(75,53,150,0.25); color: var(--purple); }
.month-cell.has-mobility { background: rgba(119,233,230,0.15); border-color: rgba(26,90,88,0.2); color: var(--aqua-text); }
.month-cell.has-both { background: linear-gradient(135deg,rgba(75,53,150,0.1),rgba(119,233,230,0.12)); border-color: rgba(40,117,150,0.3); color: var(--teal); }

/* Calendar legend */
.cal-legend { display: flex; gap: 14px; padding: 8px 16px 4px; }
.cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text3); }
.cal-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Stats strip */
.stats-strip { display: flex; gap: 8px; padding: 10px 16px; }
.stat-pill {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 8px; text-align: center;
  box-shadow: var(--shadow);
}
.stat-pill-num { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 22px; }
.stat-pill-label { font-size: 9px; color: var(--text3); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

/* Charts */
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px; margin: 0 16px 10px;
  box-shadow: var(--shadow);
}
.chart-title {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px;
  color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 7px;
}
.chart-sub { font-size: 10px; color: var(--text3); margin-bottom: 12px; }
.bar-chart { display: flex; gap: 4px; align-items: flex-end; height: 68px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; }
.bar-empty { width: 100%; border-radius: 4px 4px 0 0; background: var(--surface3); height: 4px; }
.bar-day-label { font-size: 9px; color: var(--text3); font-family: 'Outfit', sans-serif; font-weight: 600; }

/* History list */
.history-section-label {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 10px;
  letter-spacing: 2.5px; color: var(--purple); text-transform: uppercase;
  padding: 12px 16px 5px; border-bottom: 1px solid var(--border); margin: 0 16px 8px;
}
.history-entry {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 13px; margin: 0 16px 8px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  box-shadow: var(--shadow);
}
.history-entry-left { flex: 1; }
.history-entry-name {
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px;
  text-transform: uppercase; color: var(--text);
}
.history-entry-focus { font-size: 11px; color: var(--text2); margin-top: 2px; }
.history-entry-time { font-size: 10px; color: var(--text3); margin-top: 3px; }
.history-entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; flex-shrink: 0; }
.history-badge {
  background: rgba(40,117,150,0.1); border: 1px solid rgba(40,117,150,0.25);
  color: var(--teal); font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 10px; letter-spacing: 1px;
  text-transform: uppercase; padding: 3px 8px; border-radius: 6px; white-space: nowrap;
}
.mobility-history-badge {
  background: rgba(119,233,230,0.15); border: 1px solid rgba(26,90,88,0.2);
  color: var(--aqua-text);
}
.delete-entry-btn {
  background: none; border: 1px solid rgba(172,26,76,0.15);
  color: var(--text3); width: 27px; height: 27px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.18s;
}
.delete-entry-btn:active { background: rgba(172,26,76,0.1); border-color: rgba(172,26,76,0.35); color: var(--crimson); }

.history-empty {
  text-align: center; padding: 50px 20px; color: var(--text3);
  font-family: 'Outfit', sans-serif; font-size: 15px;
  letter-spacing: 1.5px; text-transform: uppercase; line-height: 2.5;
}
.clear-history-btn {
  width: calc(100% - 32px); margin: 4px 16px 16px; background: none;
  border: 1px solid rgba(172,26,76,0.25); color: var(--crimson);
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 12px;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 13px; border-radius: var(--radius-sm); cursor: pointer;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(247,245,255,0.97); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border); display: flex; z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-btn {
  flex: 1; background: none; border: none; color: var(--text3);
  font-family: 'Outfit', sans-serif; font-weight: 600;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  padding: 10px 8px 14px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s;
}
.nav-btn.active { color: var(--purple); }
.nav-btn.active .nav-svg { stroke: var(--purple); }
.nav-icon-wrap { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; }
.nav-svg { width: 20px; height: 20px; stroke: var(--text3); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 86px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--purple); color: #fff;
  font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 12px;
  letter-spacing: 2px; text-transform: uppercase; padding: 10px 20px;
  border-radius: 999px; opacity: 0; transition: all 0.3s;
  z-index: 999; white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 16px rgba(75,53,150,0.35);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CONFETTI ── */
@keyframes confettiFall {
  0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
.confetti-piece { position: fixed; top: 0; animation: confettiFall linear forwards; pointer-events: none; z-index: 9999; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

let currentDay = null; // 0-3 or 'mob'

function getExList(day) {
  if (day === 'mob') {
    return EXERCISES.mob.main.map(e => ({...e, type:'mob'}));
  }
  return [
    ...EXERCISES[day].warmup.map(e => ({...e, type:'warmup'})),
    ...EXERCISES[day].main.map(e =>   ({...e, type:'main'})),
    ...EXERCISES[day].cooldown.map(e =>({...e, type:'cool'}))
  ];
}

function initState(day) {
  if (state[day]) return;
  state[day] = {};
  getExList(day).forEach((ex, i) => {
    state[day][i] = {
      done: false,
      sets: Array.from({length: ex.sets}, () => ({reps: ex.reps, done: false}))
    };
  });
}

function openDay(dayIdx) {
  currentDay = dayIdx;
  initState(dayIdx);
  timers = {};

  const isMob = dayIdx === 'mob';
  const title = isMob ? 'Mobility' : DAYS[dayIdx].title;
  const focus  = isMob ? 'Daily Mobility Exercises' : DAYS[dayIdx].focus;
  const accent = isMob ? 'var(--aqua-text)' : DAYS[dayIdx].accentColor;
  const btnGrad= isMob ? 'linear-gradient(135deg,#1a5a58,#287596)' : DAYS[dayIdx].btnGradient;

  document.getElementById('workoutTitle').textContent = title;
  document.getElementById('workoutFocus').textContent = focus;
  document.getElementById('workoutFocus').style.color = accent;
  document.getElementById('progressBar').style.background = isMob ? 'linear-gradient(90deg,var(--aqua-text),var(--teal))' : DAYS[dayIdx].btnGradient;
  document.getElementById('completeBtn').style.background = btnGrad;

  renderWorkout();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-workout').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
}

function goHome() {
  Object.values(timers).forEach(t => { if(t.interval) clearInterval(t.interval); });
  timers = {};
  switchTab('home');
}

// RENDER WORKOUT
// ════════════════════════════════════════════
function renderWorkout() {
  const exList = document.getElementById('exerciseList');
  exList.innerHTML = '';

  if (currentDay === 'mob') {
    exList.appendChild(makeSectionLabel('mob-section','🧘 Choose Your Mobility Exercise'));
    const wrap = document.createElement('div'); wrap.className = 'exercises';
    EXERCISES.mob.main.forEach((ex, i) => wrap.appendChild(buildCard(i, {...ex, type:'mob'})));
    exList.appendChild(wrap);
  } else {
    const wc = EXERCISES[currentDay].warmup.length;
    const mc = EXERCISES[currentDay].main.length;
    const all = getExList(currentDay);

    exList.appendChild(makeSectionLabel('warmup','🔥 Warm-Up'));
    const wWrap = document.createElement('div'); wWrap.className = 'exercises';
    for (let i = 0; i < wc; i++) wWrap.appendChild(buildCard(i, all[i]));
    exList.appendChild(wWrap);

    exList.appendChild(makeSectionLabel('main','💪 Main Workout'));
    const mWrap = document.createElement('div'); mWrap.className = 'exercises';
    for (let i = wc; i < wc+mc; i++) mWrap.appendChild(buildCard(i, all[i]));
    exList.appendChild(mWrap);

    exList.appendChild(makeSectionLabel('cool','❄️ Cool Down'));
    const cWrap = document.createElement('div'); cWrap.className = 'exercises';
    for (let i = wc+mc; i < all.length; i++) cWrap.appendChild(buildCard(i, all[i]));
    exList.appendChild(cWrap);
  }
  updateProgress();
}

function makeSectionLabel(cls, text) {
  const div = document.createElement('div');
  div.className = `section-label ${cls}`;
  div.innerHTML = `${text} <div class="section-line"></div>`;
  return div;
}

function buildCard(idx, ex) {
  const s = state[currentDay][idx];
  const card = document.createElement('div');
  card.className = `ex-card ${ex.type}-card${s.done ? ' done' : ''}`;
  card.id = `ex-${idx}`;

  const timerHTML = ex.timed ? `
    <button class="timer-btn" id="tbtn-${idx}" onclick="toggleTimer(${idx},${ex.seconds})">⏱ ${ex.reps} Timer</button>
    <div class="timer-display" id="tdisp-${idx}">
      <div class="timer-time" id="ttime-${idx}">${fmtTime(ex.seconds)}</div>
      <div class="timer-label" id="tlabel-${idx}">Ready</div>
      <div class="timer-controls">
        <button class="t-ctrl-btn t-start" id="tstartbtn-${idx}" onclick="startTimer(${idx})">Start</button>
        <button class="t-ctrl-btn t-reset" onclick="resetTimer(${idx},${ex.seconds})">Reset</button>
      </div>
      <div class="timer-sound-note">🔔 Start & end sounds</div>
    </div>` : '';

  card.innerHTML = `
    <div class="ex-header" onclick="toggleExpand(${idx})">
      <button class="ex-check" onclick="event.stopPropagation();toggleDone(${idx})">
        ${s.done ? '✓' : ''}
      </button>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta-row">
          <span class="ex-meta">${ex.sets} set${ex.sets>1?'s':''} · ${ex.reps}</span>
          ${ex.timed ? '<span class="timed-badge">⏱ Timed</span>' : ''}
        </div>
      </div>
      <div class="ex-actions">
        <a class="yt-btn" href="${ex.url}" target="_blank" onclick="event.stopPropagation()" title="Watch tutorial">▶</a>
        <div class="expand-icon">⌄</div>
      </div>
    </div>
    ${ex.note ? `<div class="ex-note"><span class="ex-note-icon">💡</span><span class="ex-note-text">${ex.note}</span></div>` : ''}
    <div class="sets-panel">
      <div class="sets-label">Log Your Sets</div>
      <div class="sets-grid" id="sets-${idx}"></div>
      ${timerHTML}
    </div>`;

  renderSets(idx, card);
  return card;
}

function renderSets(exIdx, cardEl) {
  const wrap = cardEl || document.getElementById(`ex-${exIdx}`);
  const container = wrap.querySelector(`#sets-${exIdx}`);
  if (!container) return;
  const s = state[currentDay][exIdx];
  container.innerHTML = s.sets.map((set, si) => `
    <div class="set-item${set.done ? ' completed' : ''}" id="set-${exIdx}-${si}">
      <div class="set-num">Set ${si+1}</div>
      <input class="reps-input" type="text" value="${set.reps}" oninput="saveReps(${exIdx},${si},this.value)" inputmode="text">
      <button class="set-done-btn" onclick="toggleSetDone(${exIdx},${si})">${set.done ? '✓ Done' : 'Done'}</button>
    </div>`).join('');
}

function updateProgress() {
  const total = getExList(currentDay).length;
  const done  = Object.values(state[currentDay]).filter(s => s.done).length;
  const pct   = total > 0 ? (done/total)*100 : 0;
  document.getElementById('progressBar').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `${done}/${total}`;
}

// ════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════
function toggleExpand(idx) { document.getElementById(`ex-${idx}`).classList.toggle('expanded'); }

function toggleDone(idx) {
  state[currentDay][idx].done = !state[currentDay][idx].done;
  const card = document.getElementById(`ex-${idx}`);
  card.classList.toggle('done', state[currentDay][idx].done);
  const check = card.querySelector('.ex-check');
  check.textContent = state[currentDay][idx].done ? '✓' : '';
  updateProgress();
}

function toggleSetDone(exIdx, setIdx) {
  const set = state[currentDay][exIdx].sets[setIdx];
  set.done = !set.done;
  renderSets(exIdx);
  // 1 set done = exercise complete
  const anyDone = state[currentDay][exIdx].sets.some(s => s.done);
  if (anyDone && !state[currentDay][exIdx].done) {
    state[currentDay][exIdx].done = true;
    const card = document.getElementById(`ex-${exIdx}`);
    card.classList.add('done');
    card.querySelector('.ex-check').textContent = '✓';
    updateProgress();
    showToast('Exercise complete! 🎉');
  }
  if (!anyDone && state[currentDay][exIdx].done) {
    state[currentDay][exIdx].done = false;
    const card = document.getElementById(`ex-${exIdx}`);
    card.classList.remove('done');
    card.querySelector('.ex-check').textContent = '';
    updateProgress();
  }
}

function saveReps(exIdx, setIdx, val) { state[currentDay][exIdx].sets[setIdx].reps = val; }

function resetDay() {
  if (!confirm('Reset all exercises for this day?')) return;
  Object.values(timers).forEach(t => { if(t.interval) clearInterval(t.interval); });
  timers = {};
  state[currentDay] = null;
  initState(currentDay);
  renderWorkout();
}

function completeWorkout() {
  const isMob = currentDay === 'mob';
  const all = getExList(currentDay);
  const history = JSON.parse(localStorage.getItem('grind_history') || '[]');
  history.unshift({
    date: new Date().toISOString(),
    type: isMob ? 'mobility' : 'workout',
    dayIdx: currentDay,
    dayTitle: isMob ? 'Mobility' : DAYS[currentDay].title,
    focus: isMob ? 'Daily Mobility' : DAYS[currentDay].focus,
    exercises: all.map((ex,i) => ({ name:ex.name, done:state[currentDay][i].done }))
  });
  localStorage.setItem('grind_history', JSON.stringify(history));
  showToast('⚡ Logged!');
  launchConfetti();
  setTimeout(() => goHome(), 700);
}

// TIMER
// ════════════════════════════════════════════
function fmtTime(sec) {
  return `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
}

// Simple beep via Web Audio API
function beep(freq, dur, vol=0.3) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function toggleTimer(idx, totalSec) {
  const disp = document.getElementById(`tdisp-${idx}`);
  const btn  = document.getElementById(`tbtn-${idx}`);
  if (!disp.classList.contains('visible')) {
    disp.classList.add('visible');
    btn.classList.add('active');
    btn.textContent = '✕ Close Timer';
    if (!timers[idx]) timers[idx] = { interval:null, remaining:totalSec, total:totalSec, running:false };
    updateTimerDisplay(idx);
  } else {
    if (timers[idx]?.interval) clearInterval(timers[idx].interval);
    if (timers[idx]) timers[idx].running = false;
    disp.classList.remove('visible');
    btn.classList.remove('active');
    btn.textContent = `⏱ ${fmtTime(totalSec)} Timer`;
  }
}

function startTimer(idx) {
  const t = timers[idx]; if (!t) return;
  if (t.running) {
    clearInterval(t.interval); t.running = false;
    document.getElementById(`tstartbtn-${idx}`).textContent = 'Resume';
    document.getElementById(`tstartbtn-${idx}`).className = 't-ctrl-btn t-start';
    return;
  }
  if (t.remaining <= 0) return;
  beep(660, 0.15); // start sound
  t.running = true;
  document.getElementById(`tstartbtn-${idx}`).textContent = 'Pause';
  document.getElementById(`tstartbtn-${idx}`).className = 't-ctrl-btn t-pause';
  t.interval = setInterval(() => {
    t.remaining--;
    updateTimerDisplay(idx);
    if (t.remaining <= 0) {
      clearInterval(t.interval); t.running = false;
      beep(880, 0.2); setTimeout(() => beep(880,0.2), 250); // end double beep
      document.getElementById(`tstartbtn-${idx}`).textContent = 'Done ✓';
      document.getElementById(`tstartbtn-${idx}`).className = 't-ctrl-btn t-reset';
      showToast('Timer done! ✅');
    }
  }, 1000);
}

function resetTimer(idx, totalSec) {
  const t = timers[idx]; if (!t) return;
  clearInterval(t.interval); t.running = false; t.remaining = totalSec;
  updateTimerDisplay(idx);
  document.getElementById(`tstartbtn-${idx}`).textContent = 'Start';
  document.getElementById(`tstartbtn-${idx}`).className = 't-ctrl-btn t-start';
}

function updateTimerDisplay(idx) {
  const t = timers[idx]; if (!t) return;
  const el  = document.getElementById(`ttime-${idx}`);
  const lbl = document.getElementById(`tlabel-${idx}`);
  if (!el) return;
  el.textContent = fmtTime(t.remaining);
  el.className = 'timer-time';
  if (t.remaining <= 0)       { el.classList.add('done-t');  lbl.textContent = 'Complete ✓'; }
  else if (t.remaining <= 5)  { el.classList.add('warning'); lbl.textContent = 'Almost there…'; }
  else                        { lbl.textContent = t.running ? 'Running…' : 'Ready'; }
}

// HISTORY / CALENDAR
// ════════════════════════════════════════════
let calView = 'week', calOffset = 0;

function setCalView(v) {
  calView = v; calOffset = 0;
  document.getElementById('calBtnWeek').classList.toggle('active',  v==='week');
  document.getElementById('calBtnMonth').classList.toggle('active', v==='month');
  renderCalendar();
}
function calStep(d) { calOffset += d; renderCalendar(); }

function getHistoryDates() {
  const h = JSON.parse(localStorage.getItem('grind_history') || '[]');
  const workout  = new Set();
  const mobility = new Set();
  h.forEach(e => {
    const d = e.date.slice(0,10);
    if (e.type === 'mobility') mobility.add(d);
    else workout.add(d);
  });
  return { workout, mobility };
}

function renderCalendar() {
  const { workout, mobility } = getHistoryDates();
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  if (calView === 'week') {
    const monday = new Date(today);
    const dow = (today.getDay()+6)%7;
    monday.setDate(today.getDate() - dow + calOffset*7);
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    let html = '<div class="week-grid">' + days.map(d=>`<div class="week-day-label">${d}</div>`).join('');
    for (let i=0; i<7; i++) {
      const d = new Date(monday); d.setDate(monday.getDate()+i);
      const ds = d.toISOString().slice(0,10);
      const w = workout.has(ds), m = mobility.has(ds), isT = ds===todayStr;
      const cls = [w&&m?'has-both':w?'has-workout':m?'has-mobility':'', isT?'today':''].join(' ');
      const dotW = w ? `<div class="wd-dot" style="background:var(--purple)"></div>` : '';
      const dotM = m ? `<div class="wd-dot" style="background:var(--aqua-text)"></div>` : '';
      html += `<div class="week-day-cell ${cls}"><div class="wd-num">${d.getDate()}</div><div class="wd-dots">${dotW}${dotM}</div></div>`;
    }
    html += '</div>';
    document.getElementById('calGrid').innerHTML = html;

    const endDay = new Date(monday); endDay.setDate(monday.getDate()+6);
    document.getElementById('calPeriodTitle').textContent =
      monday.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) + ' – ' +
      endDay.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});

    let wCount=0, mCount=0;
    for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const ds=d.toISOString().slice(0,10);if(workout.has(ds))wCount++;if(mobility.has(ds))mCount++;}
    renderStatsAndCharts(wCount,mCount,7,'week',monday);
  } else {
    const base = new Date(today.getFullYear(), today.getMonth()+calOffset, 1);
    const yr=base.getFullYear(), mo=base.getMonth();
    const daysInMonth = new Date(yr,mo+1,0).getDate();
    const firstDow = (new Date(yr,mo,1).getDay()+6)%7;
    const dl = ['M','T','W','T','F','S','S'];
    let html = '<div class="month-grid">'+dl.map(d=>`<div class="month-cell" style="font-size:9px;font-weight:700;color:var(--text3);background:transparent;">${d}</div>`).join('');
    for(let i=0;i<firstDow;i++) html+='<div class="month-cell empty"></div>';
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const w=workout.has(ds),m=mobility.has(ds),isT=ds===todayStr;
      const cls=[w&&m?'has-both':w?'has-workout':m?'has-mobility':'',isT?'today':''].join(' ');
      html+=`<div class="month-cell ${cls}">${d}</div>`;
    }
    html+='</div>';
    document.getElementById('calGrid').innerHTML=html;
    document.getElementById('calPeriodTitle').textContent=base.toLocaleDateString('en-IN',{month:'long',year:'numeric'});

    let wCount=0,mCount=0;
    for(let d=1;d<=daysInMonth;d++){const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;if(workout.has(ds))wCount++;if(mobility.has(ds))mCount++;}
    renderStatsAndCharts(wCount,mCount,daysInMonth,'month',base);
  }
}

function renderStatsAndCharts(wCount, mCount, total, viewType, baseDate) {
  document.getElementById('statsStrip').innerHTML = `
    <div class="stat-pill"><div class="stat-pill-num" style="color:var(--purple)">${wCount}</div><div class="stat-pill-label">Workouts</div></div>
    <div class="stat-pill"><div class="stat-pill-num" style="color:var(--aqua-text)">${mCount}</div><div class="stat-pill-label">Mobility</div></div>
    <div class="stat-pill"><div class="stat-pill-num" style="color:var(--teal)">${total-wCount}</div><div class="stat-pill-label">Missed</div></div>`;

  // Build bar chart data (last 7 days for week, all weeks of month for month)
  const { workout, mobility } = getHistoryDates();
  let wBars=[], mBars=[], labels=[];

  if (viewType === 'week') {
    for(let i=0;i<7;i++){
      const d=new Date(baseDate); d.setDate(baseDate.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      wBars.push(workout.has(ds)?1:0);
      mBars.push(mobility.has(ds)?1:0);
      labels.push(['M','T','W','T','F','S','S'][i]);
    }
  } else {
    // Weeks of the month
    const yr=baseDate.getFullYear(), mo=baseDate.getMonth();
    const daysInMonth=new Date(yr,mo+1,0).getDate();
    const weeks=Math.ceil(daysInMonth/7);
    for(let w=0;w<weeks;w++){
      let wHas=false,mHas=false;
      for(let d=w*7+1;d<=Math.min((w+1)*7,daysInMonth);d++){
        const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if(workout.has(ds))wHas=true;
        if(mobility.has(ds))mHas=true;
      }
      wBars.push(wHas?1:0); mBars.push(mHas?1:0);
      labels.push(`W${w+1}`);
    }
  }

  const maxW = Math.max(...wBars,1), maxM = Math.max(...mBars,1);

  function buildBars(data, max, color, emptyColor) {
    return data.map((v,i) => {
      const pct = v > 0 ? Math.max(20, (v/max)*100) : 0;
      return `<div class="bar-col">
        ${v > 0
          ? `<div class="bar-fill" style="height:${pct}%;background:${color};"></div>`
          : `<div class="bar-empty"></div>`}
        <div class="bar-day-label" style="color:${v>0?'var(--text2)':'var(--text3)'}">${labels[i]}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('chartsWrap').innerHTML = `
    <div class="chart-card">
      <div class="chart-title"><div style="width:9px;height:9px;border-radius:50%;background:var(--purple);flex-shrink:0;"></div>Workout Days</div>
      <div class="chart-sub">Days completed this ${viewType}</div>
      <div class="bar-chart">${buildBars(wBars,maxW,'linear-gradient(180deg,var(--purple),#7B65C6)','')}</div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><div style="width:9px;height:9px;border-radius:50%;background:var(--aqua-text);flex-shrink:0;"></div>Mobility Days</div>
      <div class="chart-sub">1 exercise = day complete</div>
      <div class="bar-chart">${buildBars(mBars,maxM,'linear-gradient(180deg,var(--aqua-text),var(--teal))','')}</div>
    </div>`;
}

function renderHistoryList() {
  const history = JSON.parse(localStorage.getItem('grind_history') || '[]');
  const container = document.getElementById('historyList');
  if (history.length === 0) {
    container.innerHTML = '<div class="history-empty">No workouts logged yet.<br>Start grinding! 💪</div>';
    return;
  }
  const groups = {};
  history.forEach((entry, gi) => {
    const d = new Date(entry.date);
    const key = d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
    if (!groups[key]) groups[key] = [];
    groups[key].push({...entry, _d:d, _idx:gi});
  });
  let html = '';
  Object.entries(groups).forEach(([date, entries]) => {
    html += `<div class="history-section-label">${date}</div>`;
    entries.forEach(entry => {
      const done = entry.exercises.filter(e=>e.done).length;
      const total = entry.exercises.length;
      const time = entry._d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      const isMob = entry.type === 'mobility';
      html += `<div class="history-entry">
        <div class="history-entry-left">
          <div class="history-entry-name">${entry.dayTitle}</div>
          <div class="history-entry-focus">${entry.focus}</div>
          <div class="history-entry-time">${time}</div>
        </div>
        <div class="history-entry-right">
          <div class="history-badge ${isMob?'mobility-history-badge':''}">${done}/${total}</div>
          <button class="delete-entry-btn" onclick="deleteEntry(${entry._idx})" title="Delete">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      </div>`;
    });
  });
  html += `<button class="clear-history-btn" onclick="clearHistory()">🗑 Clear All History</button>`;
  container.innerHTML = html;
}

function deleteEntry(idx) {
  const history = JSON.parse(localStorage.getItem('grind_history') || '[]');
  history.splice(idx, 1);
  localStorage.setItem('grind_history', JSON.stringify(history));
  renderCalendar(); renderHistoryList();
}

function clearHistory() {
  if (confirm('Clear all workout history? This cannot be undone.')) {
    localStorage.removeItem('grind_history');
    renderCalendar(); renderHistoryList();
  }
}

// ════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  const nb = document.getElementById(`nav-${tab}`);
  if (nb) nb.classList.add('active');
  if (tab === 'history') { renderCalendar(); renderHistoryList(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function launchConfetti() {
  const colors = ['#4B3596','#287596','#AC1A4C','#AD6D15','#79380B','#77E9E6','#ffffff'];
  for (let i=0; i<65; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.2+Math.random()*2}s;animation-delay:${Math.random()*0.6}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
function init() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  buildHomeCards();

  if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
    const swBlob = new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:'/'}).catch(()=>{});
  }
}

init();
</script>
